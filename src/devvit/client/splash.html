<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal Garden</title>
    <style>
      :root {
        color: #202124;
        background: #fffaf1;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      section {
        max-width: 520px;
        border: 1px solid #ddd2c2;
        border-radius: 8px;
        padding: 22px;
        background: #fffdf8;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 34px;
        line-height: 1;
      }

      p {
        margin-top: 12px;
        color: #66706f;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        margin-top: 18px;
        border-radius: 8px;
        padding: 11px 14px;
        color: #fffdf8;
        background: #1f7a73;
        font-weight: 850;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Signal Garden</h1>
        <p>Guide today's signal through three beacons, then compare the community proposal.</p>
        <a href="game.html">Open relay board</a>
      </section>
    </main>
  </body>
</html>
