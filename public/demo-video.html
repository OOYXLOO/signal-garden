<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signal Garden Demo Video</title>
    <meta
      name="description"
      content="A short captioned Signal Garden walkthrough for judges and reviewers."
    >
    <link rel="icon" href="./favicon.svg">
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111514;
        color: #f5f1e8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(111, 184, 141, 0.22), transparent 32rem),
          linear-gradient(135deg, #111514 0%, #18211e 56%, #151716 100%);
      }

      main {
        box-sizing: border-box;
        display: grid;
        gap: 1rem;
        margin: 0 auto;
        max-width: 980px;
        min-height: 100vh;
        padding: clamp(1rem, 4vw, 3rem);
        align-content: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4.25rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 68ch;
        color: #d8dece;
        line-height: 1.55;
      }

      video {
        display: block;
        width: 100%;
        max-height: 68vh;
        border: 1px solid rgba(245, 241, 232, 0.18);
        background: #080a09;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      a {
        color: #ffcf6a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Signal Garden Demo Video</h1>
      <p>
        A captioned walkthrough of the daily route puzzle, review link, community proposal loop,
        and submission evidence surface.
      </p>
      <video controls preload="metadata" poster="./favicon.svg">
        <source
          src="https://raw.githubusercontent.com/OOYXLOO/signal-garden/master/docs/demo-final-captioned.webm"
          type="video/webm"
        >
        Download the demo video from the source repository.
      </video>
      <nav aria-label="Review links">
        <a href="./">Play public app</a>
        <a href="./judge.html">Open judge desk</a>
        <a href="https://raw.githubusercontent.com/OOYXLOO/signal-garden/master/docs/demo-final-captioned.webm">
          Open raw WebM
        </a>
      </nav>
    </main>
  </body>
</html>
